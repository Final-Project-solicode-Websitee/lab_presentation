<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <style>
    .box { fill:#f3f4f6; stroke:#374151; stroke-width:2; }
    .title { font: 18px sans-serif; fill:#111827; }
    .small { font: 14px sans-serif; fill:#111827; }
    .arrow { stroke:#111827; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <!-- Client -->
  <rect x="40" y="40" width="160" height="80" rx="8" class="box"/>
  <text x="120" y="90" text-anchor="middle" class="title">Client</text>

  <!-- API Gateway -->
  <rect x="260" y="30" width="200" height="100" rx="8" class="box"/>
  <text x="360" y="70" text-anchor="middle" class="title">API Gateway</text>

  <!-- Arrows (placed before services so they render behind) -->
  <path d="M200 80 L260 80" class="arrow" />
  <path d="M460 80 L520 55" class="arrow" />
  <path d="M460 80 L520 145" class="arrow" />
  <path d="M520 55 L700 55" class="arrow" />
  <path d="M520 145 L700 145" class="arrow" />

  <!-- Services -->
  <rect x="520" y="20" width="140" height="70" rx="6" class="box"/>
  <text x="590" y="55" text-anchor="middle" class="small">User Service</text>

  <rect x="520" y="110" width="140" height="70" rx="6" class="box"/>
  <text x="590" y="145" text-anchor="middle" class="small">Product Service</text>

  <rect x="700" y="20" width="140" height="70" rx="6" class="box"/>
  <text x="770" y="55" text-anchor="middle" class="small">Order Service</text>

  <rect x="700" y="110" width="140" height="70" rx="6" class="box"/>
  <text x="770" y="145" text-anchor="middle" class="small">Payment Service</text>

</svg>
